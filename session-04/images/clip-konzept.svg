<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .title { font-size: 14px; font-weight: 600; fill: #333; }
    .label { font-size: 12px; fill: #555; }
    .arrow { stroke: #888; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .input { fill: #cfe2f3; stroke: #3d85c6; stroke-width: 1.5; }
    .mask  { fill: none; stroke: #cc0000; stroke-width: 2; stroke-dasharray: 6 3; }
    .result{ fill: #93c47d; stroke: #38761d; stroke-width: 1.5; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Panel 1: Input -->
  <text x="100" y="30" text-anchor="middle" class="title">Input-Layer</text>
  <polygon class="input" points="40,60 180,55 200,180 60,200" />
  <polygon class="input" points="40,60 180,55 200,180 60,200" fill="url(#hatch)"/>
  <text x="100" y="225" text-anchor="middle" class="label">z.B. ALKIS-Flurstücke</text>

  <!-- Panel 2: Mask + Input together -->
  <text x="360" y="30" text-anchor="middle" class="title">Clip-Maske</text>
  <polygon class="input" points="300,60 440,55 460,180 320,200" opacity="0.5"/>
  <polygon class="mask" points="340,75 420,80 425,160 350,170" />
  <text x="360" y="225" text-anchor="middle" class="label">z.B. LSG-Polygon</text>

  <!-- Panel 3: Result -->
  <text x="620" y="30" text-anchor="middle" class="title">Ergebnis</text>
  <polygon class="result" points="600,75 680,80 685,160 610,170" />
  <text x="620" y="225" text-anchor="middle" class="label">nur Input innerhalb der Maske</text>

  <!-- Arrows -->
  <line class="arrow" x1="215" y1="130" x2="280" y2="130"/>
  <line class="arrow" x1="475" y1="130" x2="540" y2="130"/>

  <text x="247" y="120" text-anchor="middle" class="label">+</text>
  <text x="507" y="120" text-anchor="middle" class="label">=</text>
</svg>
